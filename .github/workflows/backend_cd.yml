name: Backend CD Pipeline (Merge to Main)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: 
      - closed
      
jobs:
  build_and_push_docker:
    runs-on: ubuntu-latest
    # 1. SAFETY CHECK: Only run if pushed directly, or if PR was actually merged
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 2. THE FIX: Telling the robot exactly where the Dockerfile hides
          file: ./UrlShortenerService/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aspnet-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/aspnet-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Production Deploy
        run: curl -X GET ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Report Production Deployment Status
        run: echo "Backend production deployment triggered on Render and Docker image pushed to Docker Hub."